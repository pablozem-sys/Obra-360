name: Supabase keep-alive                                                                                             
                                                                                                                        
  on:                                                                                                                   
    schedule:                                                                                                           
      - cron: '0 8 */5 * *'
    workflow_dispatch:

  jobs:                                                                                                                 
    ping:
      runs-on: ubuntu-latest                                                                                            
      steps:                                                                                                          
        - name: Ping Supabase
          run: |
            curl -s \
              -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
              "${{ secrets.SUPABASE_URL }}/rest/v1/projects?select=id&limit=1"
